# Jekyll / GitHub Pages config
title: "Chunhua Liao"
description: "Blog and personal site of Dr. Chunhua Liao — AI, compilers, and the messy future of humans working with machines."
url: ""
baseurl: ""

# Permalink: match existing /blog/{slug}.html URLs
permalink: /blog/:slug.html

# Collections / defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"

# Exclude non-web files from build
exclude:
  - README.md
  - "*.sh"
  - "*.py"
  - Gemfile
  - Gemfile.lock
  - vendor
  - node_modules
  - .git

# Keep existing folders
include:
  - assets
  - research
