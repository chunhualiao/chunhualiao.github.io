<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="description" content="{{ page.description | default: site.description | escape }}" />
{% if page.layout == 'post' %}
<meta property="og:title" content="{{ page.title | escape }}" />
<meta property="og:description" content="{{ page.description | default: site.description | escape }}" />
<meta property="og:type" content="article" />
<meta property="og:url" content="{{ site.url }}{{ page.url }}" />
{% if page.cover_image %}
<meta property="og:image" content="{{ site.url }}{{ page.cover_image }}" />
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:image" content="{{ site.url }}{{ page.cover_image }}" />
{% else %}
<meta name="twitter:card" content="summary" />
{% endif %}
<meta name="twitter:title" content="{{ page.title | escape }}" />
<meta name="twitter:description" content="{{ page.description | default: site.description | escape }}" />
{% endif %}
<title>{{ page.title | default: site.title }}{% if page.title %} | Chunhua Liao{% endif %}</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;family=Playfair+Display:ital,wght@0,700;1,700&amp;family=Lora:ital,wght@0,400;0,600;1,400&amp;display=swap" rel="stylesheet" />
<link rel="stylesheet" href="{{ '/assets/css/style.css?v=4' | relative_url }}" />
