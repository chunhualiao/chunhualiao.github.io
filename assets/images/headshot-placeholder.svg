<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 220" width="220" height="220">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3260;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e5fa8;stop-opacity:1" />
    </linearGradient>
    <clipPath id="circle"><circle cx="110" cy="110" r="110"/></clipPath>
  </defs>
  <!-- Background -->
  <circle cx="110" cy="110" r="110" fill="url(#bg)"/>
  <!-- Body silhouette -->
  <ellipse cx="110" cy="165" rx="52" ry="38" fill="rgba(255,255,255,0.15)"/>
  <!-- Head silhouette -->
  <circle cx="110" cy="92" r="36" fill="rgba(255,255,255,0.20)"/>
  <!-- Initials fallback -->
  <text x="110" y="105" text-anchor="middle" dominant-baseline="middle"
        font-family="Georgia, serif" font-size="42" font-weight="700"
        fill="rgba(255,255,255,0.55)">CL</text>
</svg>
